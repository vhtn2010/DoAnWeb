name: Supabase DB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: supabase-db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend migration
        run: npm --prefix backend run db:validate-migration

      - name: Sync backend migration to Supabase folder
        run: npm run db:sync

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        run: npx supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"
